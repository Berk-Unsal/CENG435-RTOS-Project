<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RTOS Case Study 1 Simulator - Ahmet</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        h2 { color: #1a73e8; border-bottom: 2px solid #e8eaed; padding-bottom: 10px; }
        .setup-section { display: flex; gap: 20px; margin-bottom: 25px; align-items: flex-start; }
        .task-table { flex: 2; border-collapse: collapse; width: 100%; }
        .task-table th, .task-table td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .task-table th { background: #f8f9fa; }
        .config-panel { flex: 1; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; }
        .controls { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        button { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-priority { background: #1a73e8; color: white; }
        .btn-rr { background: #34a853; color: white; }
        .btn-reset { background: #dadce0; color: #3c4043; }
        button:hover { opacity: 0.85; transform: translateY(-1px); }
        .gantt-wrapper { margin-top: 30px; }
        .gantt-container { overflow-x: auto; background: #202124; padding: 20px; border-radius: 10px; display: flex; gap: 2px; min-height: 50px; }
        .gantt-bar { min-width: 35px; height: 45px; color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; border-radius: 4px; }
        .H { background: #ea4335; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .M { background: #fbbc04; color: #202124; }
        .L { background: #34a853; }
        .legend { margin-top: 10px; display: flex; gap: 15px; font-size: 13px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
        .status-msg { margin-top: 15px; padding: 10px; border-radius: 5px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>Case Study 1: Scheduling, Starvation & Aging</h2>
    
    <div class="setup-section">
        <table class="task-table">
            <thead>
                <tr>
                    <th>Task</th>
                    <th>Priority (Static)</th>
                    <th>Duration (Execution Time)</th>
                    <th>Final Priority</th>
                    <th>Current Status</th>
                </tr>
            </thead>
            <tbody id="taskBody">
                <!-- Data populated by JS -->
            </tbody>
        </table>

        <div class="config-panel">
            <strong>Simulation Settings</strong>
            <div style="margin-top:10px;">
                <label><input type="checkbox" id="agingCheck"> Enable Aging (1.c Fix)</label>
            </div>
            <div style="margin-top:10px; font-size: 0.85em; color: #666;">
                Aging Rule: +1 priority every 5s of waiting.
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-priority" onclick="simulate('priority')">Run Priority Scheduling</button>
        <button class="btn-rr" onclick="simulate('rr')">Run Round Robin (1.a)</button>
        <button class="btn-reset" onclick="initTasks()">Reset Values</button>
    </div>

    <div class="gantt-wrapper">
        <strong>Gantt Chart (Visual Output):</strong>
        <div class="gantt-container" id="gantt"></div>
        <div class="legend">
            <div class="legend-item"><span class="dot" style="background:#ea4335"></span> High (H)</div>
            <div class="legend-item"><span class="dot" style="background:#fbbc04"></span> Medium (M)</div>
            <div class="legend-item"><span class="dot" style="background:#34a853"></span> Low (L)</div>
        </div>
    </div>

    <div id="statusBox" class="status-msg"></div>
</div>

<script>
    let tasks = [];

    function initTasks() {
        tasks = [
            { id: 'H', p: 3, currentP: 3, dur: 4, rem: 4, wait: 0 },
            { id: 'M', p: 2, currentP: 2, dur: 4, rem: 4, wait: 0 },
            { id: 'L', p: 1, currentP: 1, dur: 4, rem: 4, wait: 0 }
        ];
        renderTable();
        document.getElementById('gantt').innerHTML = '';
        document.getElementById('statusBox').innerText = 'Ready. Modify durations in the table to start.';
        document.getElementById('statusBox').style.background = '#e8f0fe';
    }

    function renderTable() {
        const body = document.getElementById('taskBody');
        body.innerHTML = tasks.map((t, idx) => `
            <tr>
                <td>Task ${t.id}</td>
                <td>${t.p}</td>
                <td><input type="number" value="${t.dur}" onchange="updateDur(${idx}, this.value)" style="width:50px"></td>
                <td id="prio-${t.id}">${t.currentP}</td>
                <td id="stat-${t.id}">Ready</td>
            </tr>
        `).join('');
    }

    function updateDur(idx, val) {
        tasks[idx].dur = parseInt(val);
        tasks[idx].rem = parseInt(val);
    }

    function simulate(mode) {
        const gantt = document.getElementById('gantt');
        const agingEnabled = document.getElementById('agingCheck').checked;
        gantt.innerHTML = '';
        
        // Reset tasks for fresh simulation
        tasks.forEach(t => { t.rem = t.dur; t.wait = 0; t.currentP = t.p; });
        
        let log = [];
        let time = 0;
        const maxTime = 40; // Limit for visualization

        while (time < maxTime) {
            let ready = tasks.filter(t => t.rem > 0);
            if (ready.length === 0) break;

            let current;
            if (mode === 'priority') {
                ready.sort((a, b) => b.currentP - a.currentP);
                current = ready[0];
            } else { // Round Robin
                let q = 2; // Quantum
                current = ready[time % ready.length]; // Simple RR logic
            }

            // Execute 1 unit
            log.push(current.id);
            current.rem--;
            
            // Aging Logic
            if (agingEnabled && mode === 'priority') {
                tasks.forEach(t => {
                    if (t.rem > 0 && t !== current) {
                        t.wait++;
                        if (t.wait >= 5) {
                            t.currentP++;
                            t.wait = 0;
                        }
                    }
                });
            }

            time++;
        }

        renderGantt(log);
        updateStatus(mode, agingEnabled);
    }

    function renderGantt(log) {
        const container = document.getElementById('gantt');
        container.innerHTML = log.map(id => `<div class="gantt-bar ${id}">${id}</div>`).join('');
    }

    function updateStatus(mode, aging) {
        tasks.forEach(t => {
            document.getElementById(`stat-${t.id}`).innerText = t.rem > 0 ? 'Starving/Waiting' : 'Finished';
            document.getElementById(`stat-${t.id}`).style.color = t.rem > 0 ? 'red' : 'green';
            document.getElementById(`prio-${t.id}`).innerText = t.currentP;
        });
        
        let msg = mode === 'priority' ? 'Running Priority Scheduling.' : 'Running Round Robin Scheduling.';
        if (aging) msg += ' Aging is ACTIVE.';
        document.getElementById('statusBox').innerText = msg;
    }

    initTasks();
</script>
</body>
</html>
